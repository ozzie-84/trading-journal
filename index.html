<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>יומן מסחר</title>
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="יומן מסחר">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <header class="topbar">
    <h1 id="pageTitle">יומן מסחר</h1>
    <button id="menuBtn" class="icon-btn" aria-label="תפריט">☰</button>
  </header>

  <!-- Screens container -->
  <main id="screen" class="screen"></main>

  <!-- Bottom navigation -->
  <nav class="bottomnav">
    <button class="navbtn" data-route="home"><span class="navicon">🏠</span><span>בית</span></button>
    <button class="navbtn" data-route="trades"><span class="navicon">📒</span><span>עסקאות</span></button>
    <button class="navbtn" data-route="insights"><span class="navicon">📊</span><span>תובנות</span></button>
    <button class="navbtn" data-route="calendar"><span class="navicon">📅</span><span>לוח שנה</span></button>
    <button class="navbtn" data-route="settings"><span class="navicon">⚙️</span><span>הגדרות</span></button>
  </nav>

  <!-- Floating action button for quick daily update -->
  <button id="fab" class="fab" aria-label="עדכון יומי">➕</button>
</div>

<!-- Modal root -->
<div id="modalRoot"></div>
<div id="toastRoot" class="toast-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="db.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>
</body>
</html>
