<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יומן מסחר אישי</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.9); }
        .tab-active { color: #2563eb; border-top: 3px solid #2563eb; }
        input, select, textarea { font-size: 16px !important; } /* מונע זום באייפון */
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-30 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600 dark:text-blue-400">יומן מסחר</h1>
        <div class="flex gap-3">
            <button onclick="exportData()" title="ייצוא"><i data-lucide="download" class="w-5 h-5"></i></button>
            <button onclick="toggleDarkMode()" title="מצב לילה"><i data-lucide="moon" class="w-5 h-5"></i></button>
        </div>
    </header>

    <!-- Main Content Containers -->
    <main id="app-content" class="p-4 max-w-lg mx-auto">
        <!-- View: Dashboard -->
        <section id="view-dashboard" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 col-span-2">
                    <p class="text-sm text-gray-500">שווי תיק נוכחי</p>
                    <h2 id="stat-total-value" class="text-3xl font-bold">₪0</h2>
                    <div id="stat-change" class="text-sm mt-1 font-medium"></div>
                </div>
                <div class="glass-card p-3 rounded-xl border border-gray-100 dark:border-gray-700">
                    <p class="text-xs text-gray-500">רווח/הפסד נקי</p>
                    <p id="stat-net-profit" class="text-lg font-semibold">₪0</p>
                </div>
                <div class="glass-card p-3 rounded-xl border border-gray-100 dark:border-gray-700">
                    <p class="text-xs text-gray-500">תשואה כוללת</p>
                    <p id="stat-yield" class="text-lg font-semibold">0%</p>
                </div>
            </div>

            <button onclick="openModal('modal-daily')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                + עדכון יומי מהיר
            </button>

            <div class="glass-card p-4 rounded-2xl border border-gray-100 dark:border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">ביצועים לאורך זמן</h3>
                    <select id="chart-period" onchange="updateCharts()" class="bg-transparent text-xs border rounded p-1">
                        <option value="30">חודש</option>
                        <option value="90">רבעון</option>
                        <option value="365">שנה</option>
                        <option value="all">הכל</option>
                    </select>
                </div>
                <canvas id="portfolioChart" height="200"></canvas>
            </div>
        </section>

        <!-- View: Trades -->
        <section id="view-trades" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">יומן עסקאות</h2>
                <button onclick="openModal('modal-trade')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">+ עסקה חדשה</button>
            </div>
            <div id="trades-list" class="space-y-3">
                <!-- Trades will be injected here -->
            </div>
        </section>

        <!-- View: Stats -->
        <section id="view-stats" class="hidden space-y-4">
            <h2 class="text-xl font-bold">ניתוח אסטרטגיות</h2>
            <div id="strategy-stats" class="space-y-3"></div>
        </section>

        <!-- View: Settings -->
        <section id="view-settings" class="hidden space-y-4">
            <h2 class="text-xl font-bold">הגדרות וגיבוי</h2>
            <div class="glass-card p-4 rounded-xl space-y-4">
                <div>
                    <label class="block text-sm mb-1">ניהול אסטרטגיות (מופרד בפסיק)</label>
                    <input type="text" id="setting-strategies" class="w-full p-2 border rounded dark:bg-gray-700" onchange="saveSettings()">
                </div>
                <div class="pt-4 border-t flex flex-col gap-2">
                    <button onclick="downloadBackup()" class="w-full p-2 bg-gray-200 dark:bg-gray-700 rounded font-medium">גיבוי נתונים (JSON)</button>
                    <label class="w-full p-2 bg-gray-200 dark:bg-gray-700 rounded font-medium text-center cursor-pointer">
                        שחזור מגיבוי
                        <input type="file" class="hidden" onchange="importBackup(this)">
                    </label>
                    <button onclick="clearAllData()" class="w-full p-2 text-red-500 text-sm">מחיקת כל הנתונים</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center safe-area-bottom z-40">
        <button onclick="showView('dashboard')" class="nav-item p-3 flex flex-col items-center flex-1 tab-active" id="nav-dashboard">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">ראשי</span>
        </button>
        <button onclick="showView('trades')" class="nav-item p-3 flex flex-col items-center flex-1 text-gray-400" id="nav-trades">
            <i data-lucide="list" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">עסקאות</span>
        </button>
        <button onclick="showView('stats')" class="nav-item p-3 flex flex-col items-center flex-1 text-gray-400" id="nav-stats">
            <i data-lucide="pie-chart" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">סטטיסטיקה</span>
        </button>
        <button onclick="showView('settings')" class="nav-item p-3 flex flex-col items-center flex-1 text-gray-400" id="nav-settings">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">הגדרות</span>
        </button>
    </nav>

    <!-- Modals -->
    <div id="modal-daily" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-center">עדכון שווי תיק</h3>
            <form onsubmit="handleDailyUpdate(event)" class="space-y-4">
                <input type="date" id="daily-date" required class="w-full p-3 border rounded-xl dark:bg-gray-700">
                <input type="number" step="any" id="daily-value" placeholder="שווי תיק (₪)" required class="w-full p-3 border rounded-xl dark:bg-gray-700">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="any" id="daily-deposit" placeholder="הפקדה" class="p-3 border rounded-xl dark:bg-gray-700">
                    <input type="number" step="any" id="daily-withdraw" placeholder="משיכה" class="p-3 border rounded-xl dark:bg-gray-700">
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="closeModal('modal-daily')" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl">ביטול</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-trade" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl my-auto">
            <h3 class="text-xl font-bold mb-4 text-center">תיעוד עסקה</h3>
            <form onsubmit="handleTradeUpdate(event)" class="space-y-3">
                <input type="text" id="trade-asset" placeholder="נכס (למשל: AAPL, BTC)" required class="w-full p-2 border rounded-lg dark:bg-gray-700">
                <select id="trade-strategy" class="w-full p-2 border rounded-lg dark:bg-gray-700"></select>
                <input type="number" step="any" id="trade-profit" placeholder="רווח/הפסד (₪)" required class="w-full p-2 border rounded-lg dark:bg-gray-700">
                <div class="flex items-center gap-2 text-sm">
                    <input type="checkbox" id="trade-plan">
                    <label for="trade-plan">פעלתי לפי התוכנית?</label>
                </div>
                <div>
                    <label class="block text-xs mb-1">דירוג (1-5 כוכבים)</label>
                    <input type="range" id="trade-rating" min="1" max="5" value="5" class="w-full">
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="closeModal('modal-trade')" class="flex-1 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">ביטול</button>
                    <button type="submit" class="flex-1 py-2 bg-green-600 text-white rounded-lg font-bold">שמור עסקה</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Core Data Logic ---
        let data = {
            daily: [],
            trades: [],
            settings: { strategies: ['פריצה', 'נסיגה', 'היפוך'], darkMode: false }
        };

        const storageKey = 'trading_journal_data';

        function init() {
            const saved = localStorage.getItem(storageKey);
            if (saved) data = JSON.parse(saved);

            lucide.createIcons();
            document.getElementById('daily-date').valueAsDate = new Date();
            if (data.settings.darkMode) document.documentElement.classList.add('dark');

            updateUI();
            refreshStrategiesList();
        }

        function saveData() {
            localStorage.setItem(storageKey, JSON.stringify(data));
            updateUI();
        }

        // --- Navigation ---
        function showView(viewName) {
            ['dashboard', 'trades', 'stats', 'settings'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`nav-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`nav-${v}`).classList.add('text-gray-400');
            });
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.getElementById(`nav-${viewName}`).classList.add('tab-active', 'text-blue-600');
            document.getElementById(`nav-${viewName}`).classList.remove('text-gray-400');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- Handlers ---
        function handleDailyUpdate(e) {
            e.preventDefault();
            const date = document.getElementById('daily-date').value;
            const val = parseFloat(document.getElementById('daily-value').value);
            const dep = parseFloat(document.getElementById('daily-deposit').value || 0);
            const wit = parseFloat(document.getElementById('daily-withdraw').value || 0);

            const existingIdx = data.daily.findIndex(d => d.date === date);
            if (existingIdx > -1) {
                if (!confirm('קיימת כבר רשומה לתאריך זה. לעדכן?')) return;
                data.daily[existingIdx] = { date, val, dep, wit };
            } else {
                data.daily.push({ date, val, dep, wit });
            }

            data.daily.sort((a, b) => new Date(a.date) - new Date(b.date));
            saveData();
            closeModal('modal-daily');
            e.target.reset();
        }

        function handleTradeUpdate(e) {
            e.preventDefault();
            const trade = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                asset: document.getElementById('trade-asset').value,
                strategy: document.getElementById('trade-strategy').value,
                profit: parseFloat(document.getElementById('trade-profit').value),
                plan: document.getElementById('trade-plan').checked,
                rating: parseInt(document.getElementById('trade-rating').value)
            };
            data.trades.unshift(trade);
            saveData();
            closeModal('modal-trade');
            e.target.reset();
        }

        // --- Logic & Stats ---
        function updateUI() {
            // Stats Calculations
            const lastEntry = data.daily[data.daily.length - 1] || { val: 0, dep: 0, wit: 0 };
            const prevEntry = data.daily[data.daily.length - 2] || { val: 0, dep: 0, wit: 0 };

            document.getElementById('stat-total-value').innerText = `₪${lastEntry.val.toLocaleString()}`;

            const diff = lastEntry.val - prevEntry.val - (lastEntry.dep - lastEntry.wit);
            const diffPct = prevEntry.val !== 0 ? (diff / prevEntry.val) * 100 : 0;

            const changeEl = document.getElementById('stat-change');
            changeEl.innerText = `${diff > 0 ? '+' : ''}₪${diff.toLocaleString()} (${diffPct.toFixed(2)}%)`;
            changeEl.className = diff >= 0 ? 'text-green-500' : 'text-red-500';

            const totalDeposits = data.daily.reduce((sum, d) => sum + (d.dep || 0) - (d.wit || 0), 0);
            const netProfit = lastEntry.val - totalDeposits;
            document.getElementById('stat-net-profit').innerText = `₪${netProfit.toLocaleString()}`;
            document.getElementById('stat-net-profit').className = netProfit >= 0 ? 'text-lg font-semibold text-green-500' : 'text-lg font-semibold text-red-500';

            renderTrades();
            renderStats();
            updateCharts();
        }

        function renderTrades() {
            const container = document.getElementById('trades-list');
            container.innerHTML = data.trades.map(t => `
                <div class="glass-card p-4 rounded-xl flex justify-between items-center shadow-sm border-r-4 ${t.profit >= 0 ? 'border-green-500' : 'border-red-500'}">
                    <div>
                        <div class="font-bold">${t.asset} <span class="text-xs font-normal text-gray-500 mr-2">${t.strategy}</span></div>
                        <div class="text-xs text-gray-400">${t.date} | ${'★'.repeat(t.rating)}</div>
                    </div>
                    <div class="text-left">
                        <div class="font-bold ${t.profit >= 0 ? 'text-green-600' : 'text-red-600'}">₪${t.profit}</div>
                        <button onclick="deleteTrade(${t.id})" class="text-[10px] text-gray-400 underline">מחיקה</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteTrade(id) {
            if (confirm('למחוק עסקה?')) {
                data.trades = data.trades.filter(t => t.id !== id);
                saveData();
            }
        }

        function renderStats() {
            const stratStats = {};
            data.settings.strategies.forEach(s => stratStats[s] = { count: 0, profit: 0, wins: 0 });

            data.trades.forEach(t => {
                if (!stratStats[t.strategy]) stratStats[t.strategy] = { count: 0, profit: 0, wins: 0 };
                stratStats[t.strategy].count++;
                stratStats[t.strategy].profit += t.profit;
                if (t.profit > 0) stratStats[t.strategy].wins++;
            });

            const sorted = Object.entries(stratStats).sort((a, b) => b[1].profit - a[1].profit);

            document.getElementById('strategy-stats').innerHTML = sorted.map(([name, s]) => `
                <div class="glass-card p-4 rounded-xl">
                    <div class="flex justify-between">
                        <span class="font-bold">${name}</span>
                        <span class="${s.profit >= 0 ? 'text-green-600' : 'text-red-600'} font-bold">₪${s.profit.toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500 mt-2">
                        <span>עסקאות: ${s.count}</span>
                        <span>אחוז הצלחה: ${s.count ? ((s.wins/s.count)*100).toFixed(0) : 0}%</span>
                    </div>
                </div>
            `).join('');
        }

        let mainChart;
        function updateCharts() {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            const period = document.getElementById('chart-period').value;

            let filteredData = [...data.daily];
            if (period !== 'all') {
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - parseInt(period));
                filteredData = filteredData.filter(d => new Date(d.date) >= cutoff);
            }

            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredData.map(d => d.date.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{
                        label: 'שווי תיק',
                        data: filteredData.map(d => d.val),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        function refreshStrategiesList() {
            const sel = document.getElementById('trade-strategy');
            sel.innerHTML = data.settings.strategies.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('setting-strategies').value = data.settings.strategies.join(', ');
        }

        function saveSettings() {
            const strats = document.getElementById('setting-strategies').value.split(',').map(s => s.trim()).filter(s => s);
            data.settings.strategies = strats;
            saveData();
            refreshStrategiesList();
        }

        function toggleDarkMode() {
            data.settings.darkMode = !data.settings.darkMode;
            document.documentElement.classList.toggle('dark');
            saveData();
        }

        // --- Export ---
        function exportData() {
            downloadBackup();
        }

        // --- Backup & Restore ---
        function downloadBackup() {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trading_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm('האם לשחזר נתונים? הפעולה תדרוס נתונים קיימים.')) {
                        data = imported;
                        saveData();
                        location.reload();
                    }
                } catch (err) { alert('קובץ לא תקין'); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm('זהירות! כל המידע יימחק לצמיתות. להמשיך?')) {
                localStorage.clear();
                location.reload();
            }
        }

        init();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW register failed', err));
        }
    </script>
</body>
</html>
